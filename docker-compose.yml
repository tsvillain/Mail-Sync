# ╔══════════════════════════════════════════════════════════════════════════════╗
# ║  Gmail Multi-Account Sync — Docker Compose (optional convenience wrapper)   ║
# ║                                                                              ║
# ║  You can use this file OR run the image directly with docker run.           ║
# ║                                                                              ║
# ║  Quick start (compose)                                                       ║
# ║    1. cp .env.sample .env  and fill in your values                          ║
# ║    2. docker compose up --build -d                                          ║
# ║    3. Open http://localhost:3001                                             ║
# ║                                                                              ║
# ║  Quick start (plain docker)                                                  ║
# ║    docker build -t gmail-sync .                                             ║
# ║    docker run -d -p 3000:3000 -p 3001:3001 --env-file .env gmail-sync      ║
# ║                                                                              ║
# ║  Ports                                                                       ║
# ║    3000 — sync server  (OAuth callback, backend API)                        ║
# ║    3001 — Next.js UI                                                        ║
# ╚══════════════════════════════════════════════════════════════════════════════╝

services:

  gmail-sync:
    build:
      context: .
      dockerfile: Dockerfile
    image: gmail-sync:latest
    container_name: gmail-sync
    restart: unless-stopped

    # Load all variables from the root .env file
    env_file:
      - .env

    ports:
      # 3000 — sync server (must match BASE_URL and OAuth redirect URI)
      - "${AUTH_PORT:-3000}:3000"
      # 3001 — Next.js dashboard UI
      - "3001:3001"

    volumes:
      # Attachments saved by the sync engine — persisted on the host
      - ./attachments:/app/attachments

    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
